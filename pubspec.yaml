name: tecstock
description: "Sistema de Gerenciamento de Oficina"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.0.0
  intl: ^0.20.2
  mask_text_input_formatter: ^2.9.0
  cpf_cnpj_validator: ^2.0.0
  table_calendar: ^3.0.0
  flutter_localizations:
    sdk: flutter
  printing: ^5.14.2
  pdf: ^3.11.3
  google_fonts: ^6.0.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  image: ^4.0.17
  jwt_decoder: ^2.0.1
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_launcher_icons:
  android: false
  ios: false
  image_path: assets/images/TecStock_logo.png
  web:
    generate: true
    image_path: assets/images/TecStock_logo.png
    background_color: "#F5F7FB"
    theme_color: "#0B74B7"
